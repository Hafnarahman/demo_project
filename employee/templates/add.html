<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
</head>
<body>

<h2>Add Employee</h2>

<form method="post">
    {% csrf_token %}

    <p>Name</p>
    <input type="text" name="name">

    <p>Email</p>
    <input type="email" name="email">

    <p>Age</p>
    <input type="number" name="age">

    <p>City</p>
    <input type="text" name="city">

    <br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
